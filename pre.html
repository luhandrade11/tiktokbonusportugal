<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Portugal</title>
    <style>
        /* Reset básico e centralização */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        /* Container da tela de carregamento */
        .loader-container {
            text-align: center;
        }

        /* O círculo de carregamento */
        .loader {
            width: 80px;
            height: 80px;
            border: 8px solid #ccc;
            border-top: 8px solid #006600; /* Verde de Portugal */
            border-bottom: 8px solid #FF0000; /* Vermelho de Portugal */
            border-radius: 50%;
            display: inline-block;
            animation: spin 1.5s linear infinite;
            position: relative;
        }

        /* Detalhe central (Esfera Armilar / Amarelo) */
        .loader::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            background-color: #FFD700; /* Dourado/Amarelo */
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        /* Animação de rotação */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Texto de carregamento */
        .loading-text {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Efeito de "pulo" nas letras */
        .loading-text span {
            display: inline-block;
            animation: bounce 0.6s infinite alternate;
        }

        .loading-text span:nth-child(2) { animation-delay: 0.1s; }
        .loading-text span:nth-child(3) { animation-delay: 0.2s; }

        @keyframes bounce {
            to { transform: translateY(-5px); }
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <!-- Círculo Animado -->
        <div class="loader"></div>
        
        <!-- Texto Animado -->
        <div class="loading-text">
            Carregando<span>.</span><span>.</span><span>.</span>
        </div>
    </div>

</body>
</html>
