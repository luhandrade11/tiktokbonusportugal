<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A carregar...</title>
    <style>
        /* Estilo Clean Minimalista */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffffff; /* Fundo Branco Puro */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .loader-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Spinner Gradiente Rosa TikTok */
        .spinner {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            /* Gradiente apenas em tons de rosa */
            background: conic-gradient(from 0deg, transparent 30%, #fe2c55); 
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #fff 0);
            mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #fff 0);
            animation: rotate 1s infinite linear;
        }

        /* Texto Discreto */
        .loading-text {
            margin-top: 15px;
            color: #121212;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: -0.2px;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        /* Suavidade na entrada da tela */
        .loader-wrapper {
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="loader-wrapper">
        <div class="spinner"></div>
        <div class="loading-text">A preparar o acesso...</div>
    </div>

    <script>
        // Redirecionamento após 2 segundos
        setTimeout(function() {
            // Captura todos os parâmetros da URL (ttclid, ad_id, etc)
            const currentParams = window.location.search;
            const targetUrl = "https://acessoantecipadooficial.vercel.app/";
            
            // Redireciona com os parâmetros
            window.location.href = targetUrl + currentParams;
        }, 3000);
    </script>

</body>
</html>
